  <style>
    :root {
      color-scheme: light;
      --accent: #2563eb;
      --text: #172033;
      --muted: #64748b;
      --border: #dbe4f0;
      --surface: #ffffff;
      --bg: #f6f8fc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(100%, 420px);
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.3;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .actions {
      display: grid;
      gap: 12px;
    }

    a {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      text-align: center;
      text-decoration: none;
      font-weight: 600;
    }

    a.primary {
      background: var(--accent);
      color: #ffffff;
    }
  </style>
  <script>
    (function () {
      var appStoreUrl = "https://apps.apple.com/jp/app/%E3%83%94%E3%82%AF%E3%83%88%E3%83%A1%E3%83%A2-%E5%86%99%E7%9C%9F%E3%81%A7%E3%83%A1%E3%83%A2%E3%81%99%E3%82%8B%E3%82%AB%E3%83%A1%E3%83%A9/id641415936";
      var playStoreUrl = "https://play.google.com/store/apps/details?id=com.senote.android.pictmemo";
      var ua = navigator.userAgent || navigator.vendor || "";
      var platform = navigator.platform || "";
      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (platform === "MacIntel" && navigator.maxTouchPoints > 1);

      if (isAndroid) {
        window.location.replace(playStoreUrl);
        return;
      }

      if (isIOS) {
        window.location.replace(appStoreUrl);
        return;
      }

      window.location.replace(appStoreUrl);
    }());
  </script>

<body>
  <main>

    </div>
  </main>
